name: Docker build & publish

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 3 AM

env:
  REGISTRY: ghcr.io
  IMAGE_SUFFIX: -v2ray

concurrency:
  group: "docker-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app: [ssserver, sslocal]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore last build info
        id: cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: v2ray-cache-${{ matrix.app }}-${{ github.run_id }}
          restore-keys: v2ray-cache-${{ matrix.app }}-

      - name: Get latest v2ray-plugin tag
        id: v2ray
        run: |
          latest=$(curl -s https://api.github.com/repos/teddysun/v2ray-plugin/releases/latest | jq -r .tag_name)
          echo "latest=$latest" >> $GITHUB_OUTPUT

      - name: Get previous build info
        id: prev
        run: |
          mkdir -p .cache
          [ -f .cache/last_v2ray_tag ] && echo "v2ray=$(cat .cache/last_v2ray_tag)" >> $GITHUB_OUTPUT || echo "v2ray=" >> $GITHUB_OUTPUT

      - name: Determine if build is needed
        id: build_check
        run: |
          v2ray_changed=$([ "${{ steps.v2ray.outputs.latest }}" != "${{ steps.prev.outputs.v2ray }}" ] && echo "true" || echo "false")
          
          if [ "$v2ray_changed" = "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to the Container registry
        if: steps.build_check.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.build_check.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.actor }}/${{ matrix.app }}${{ env.IMAGE_SUFFIX }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.v2ray.outputs.latest }}

      - name: Build and push
        if: steps.build_check.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: ${{ matrix.app }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          build-args: |
            V2RAY_TAG=${{ steps.v2ray.outputs.latest }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save build info to cache
        if: steps.build_check.outputs.should_build == 'true'
        run: |
          echo "${{ steps.v2ray.outputs.latest }}" > .cache/last_v2ray_tag
